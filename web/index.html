<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometry Draw</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">

    <!-- Input bar -->
    <div class="input-bar">
      <textarea id="prompt" placeholder="Enter geometry problem…" rows="3"></textarea>
      <div class="input-controls">
        <button id="run">&#9654; Run</button>
        <button id="clear">&#10005; Clear</button>
      </div>
    </div>

    <!-- Main content: figure + pipeline -->
    <div class="main">
      <div class="figure-area" id="figure-area">
        <div class="placeholder" id="placeholder">Enter a geometry problem above and press Run.</div>
      </div>
      <div class="results-panel">

        <div class="results-section">
          <div class="results-section-header">
            <span>DSL Result</span>
            <button class="copy-btn" id="copy-dsl">Copy</button>
          </div>
          <pre id="out-dsl" class="results-pre"></pre>
        </div>

        <div class="results-section">
          <div class="results-section-header">
            <span>Canonical IR</span>
            <button class="copy-btn" id="copy-canonical">Copy</button>
          </div>
          <pre id="out-canonical" class="results-pre"></pre>
        </div>

        <div class="results-section results-section--scene">
          <div class="results-section-header results-section-header--scene">
            <span>Scene Graph</span>
            <button class="copy-btn" id="copy-scene">Copy</button>
          </div>
          <pre id="out-scene" class="results-pre"></pre>
        </div>

      </div>
    </div>

  </div>

  <script src="./config.js"></script>
  <script src="./geometry-helpers.js"></script>
  <script src="./interactive.js"></script>
  <script src="./geo-interact.js"></script>
  <script src="./app.js"></script>
</body>
</html>
