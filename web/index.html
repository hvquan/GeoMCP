<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometry Draw</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">

    <!-- Input bar -->
    <div class="input-bar">
      <textarea id="prompt" placeholder="Enter geometry problem…"></textarea>
      <div class="input-controls">
        <button id="run">&#9654; Run</button>
        <button id="clear">&#10005; Clear</button>
      </div>
    </div>

    <!-- Main content: figure + pipeline -->
    <div class="main">
      <div class="figure-area" id="figure-area">
        <div class="placeholder" id="placeholder">Enter a geometry problem above and press Run.</div>
      </div>
      <div class="pipeline-panel" id="pipeline-panel">
        <div class="pipeline-panel-header">
          <span>Pipeline</span>
        </div>
        <div class="pipeline-steps" id="pipeline-steps">
          <div class="pipeline-empty">Run a problem to see pipeline steps.</div>
        </div>
      </div>
    </div>

  </div>

  <script src="./config.js"></script>
  <script src="./geometry-helpers.js"></script>
  <script src="./interactive.js"></script>
  <script src="./geo-interact.js"></script>
  <script src="./app.js"></script>
</body>
</html>
