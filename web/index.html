<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoMCP Chat UI</title>
  <style>
    :root {
      --bg: #f4efe6;
      --bg2: #e8f2ff;
      --panel: #fffdf7;
      --ink: #1c2430;
      --muted: #6b7280;
      --accent: #c2410c;
      --user: #0f766e;
      --assistant: #1d4ed8;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Serif", Georgia, serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 0%, #fff7ed 0, transparent 36%),
        radial-gradient(circle at 100% 100%, #dbeafe 0, transparent 34%),
        linear-gradient(120deg, var(--bg) 0%, var(--bg2) 100%);
    }

    .app {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 290px 1fr;
      gap: 16px;
    }

    .sidebar {
      background: rgba(255, 253, 247, 0.92);
      border: 1px solid #e5dcc8;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.08);
    }

    .brand {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .sub {
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.6;
      font-size: 14px;
    }

    .chip {
      display: inline-block;
      margin: 8px 8px 0 0;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: #1e3a8a;
      background: #dbeafe;
    }

    .main {
      min-height: 78vh;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #d6deef;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.1);
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .messages {
      padding: 18px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bubble {
      max-width: 85%;
      border-radius: 16px;
      padding: 12px 14px;
      line-height: 1.55;
      animation: rise 220ms ease;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: #d1fae5;
      border: 1px solid #99f6e4;
    }

    .assistant {
      align-self: flex-start;
      background: #eef4ff;
      border: 1px solid #c7d2fe;
    }

    .error {
      align-self: flex-start;
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: var(--danger);
    }

    .svg-wrap {
      margin-top: 10px;
      background: #fff;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      padding: 8px;
      overflow: auto;
    }

    .svg-help {
      margin-top: 6px;
      font-size: 12px;
      color: #475569;
    }

    .dragging-point {
      cursor: grabbing;
    }

    .composer {
      border-top: 1px solid #e2e8f0;
      padding: 14px;
      background: #fcfcff;
    }

    .composer textarea {
      width: 100%;
      min-height: 84px;
      resize: vertical;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 10px 12px;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      font-size: 15px;
    }

    .row {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .row input[type="file"] {
      font-size: 13px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(90deg, #ea580c, #0284c7);
    }

    .ghost {
      background: #e2e8f0;
      color: #1f2937;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    .progress {
      margin-top: 8px;
      font-size: 13px;
      color: #334155;
    }

    .loader {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 3px solid #cbd5e1;
      border-top-color: var(--assistant);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { order: 2; }
      .main { min-height: 70vh; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="brand">GeoMCP Chat</h1>
      <p class="sub">
        Nhap de toan hinh hoc hoac upload anh. He thong se OCR (neu co anh), phan tich de,
        giai rang buoc va ve hinh SVG.
      </p>
      <span class="chip">Text to Diagram</span>
      <span class="chip">Image to Text</span>
      <span class="chip">Constraint Solver</span>
      <p class="meta">Tip: Ban co the danh may de bai ro rang de giam sai OCR.</p>
    </aside>

    <section class="main">
      <div id="messages" class="messages"></div>

      <div class="composer">
        <textarea id="prompt" placeholder="Nhap de bai hinh hoc..."></textarea>
        <div class="row">
          <input id="file" type="file" accept="image/*" />
          <select id="mode">
            <option value="heuristic" selected>Parser mode: Heuristic only</option>
            <option value="llm">Parser mode: LLM + fallback</option>
            <option value="llm-strict">Parser mode: LLM strict (JSON -> draw)</option>
          </select>
          <button id="send">Gui</button>
          <button id="clear" class="ghost">Xoa hoi thoai</button>
        </div>
      </div>
    </section>
  </div>

  <script src="./config.js"></script>
  <script>
    const messages = document.getElementById("messages");
    const promptEl = document.getElementById("prompt");
    const fileEl = document.getElementById("file");
    const sendBtn = document.getElementById("send");
    const clearBtn = document.getElementById("clear");
    const modeEl = document.getElementById("mode");
    const SESSION_KEY = "geomcp_chat_session_id";
    const apiBase = (window.GEOMCP_API_BASE || "").replace(/\/$/, "");

    function apiUrl(path) {
      return apiBase ? `${apiBase}${path}` : path;
    }

    function ensureSessionId() {
      let id = localStorage.getItem(SESSION_KEY);
      if (!id) {
        id = `sess_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
        localStorage.setItem(SESSION_KEY, id);
      }
      return id;
    }

    const sessionId = ensureSessionId();

    function pushBubble(role, text) {
      const div = document.createElement("div");
      div.className = `bubble ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function pushAssistantWithSvg(payload) {
      const div = document.createElement("div");
      div.className = "bubble assistant";

      const summary = document.createElement("div");
      const lines = [
        `Parser: ${payload.parserVersion}`,
        `Diagnostics: ${(payload.diagnostics || []).length}`,
        payload.recognizedText ? `Recognized text:\n${payload.recognizedText}` : ""
      ].filter(Boolean).join("\n\n");
      summary.textContent = lines;
      div.appendChild(summary);

      if (payload.warnings && payload.warnings.length) {
        const warn = document.createElement("div");
        warn.className = "meta";
        warn.textContent = `Warnings: ${payload.warnings.join(" | ")}`;
        div.appendChild(warn);
      }

      const wrap = document.createElement("div");
      wrap.className = "svg-wrap";
      wrap.innerHTML = payload.svg;
      div.appendChild(wrap);

      if (payload.parsed) {
        const details = document.createElement("details");
        const summaryEl = document.createElement("summary");
        summaryEl.textContent = "Parsed JSON (elements + constraints)";
        details.appendChild(summaryEl);

        const pre = document.createElement("pre");
        pre.style.whiteSpace = "pre-wrap";
        pre.style.fontSize = "12px";
        pre.style.marginTop = "8px";
        pre.textContent = JSON.stringify(payload.parsed, null, 2);
        details.appendChild(pre);
        div.appendChild(details);
      }

      const help = document.createElement("div");
      help.className = "svg-help";
      help.textContent = "Interactive viewer: keo diem de chinh hinh, cuon chuot de zoom, keo nen de pan.";
      div.appendChild(help);

      enhanceInteractiveSvg(wrap, payload.parsed || null);

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function distance(x1, y1, x2, y2) {
      const dx = x1 - x2;
      const dy = y1 - y2;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function parseNumber(v, fallback = 0) {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    function findNearestPoint(points, x, y, threshold = 10) {
      let best = null;
      let bestD = Number.POSITIVE_INFINITY;
      for (const p of points) {
        const d = distance(p.x, p.y, x, y);
        if (d < bestD) {
          bestD = d;
          best = p;
        }
      }
      if (!best || bestD > threshold) {
        return null;
      }
      return best;
    }

    function enhanceInteractiveSvg(container, parsed) {
      const svg = container.querySelector("svg");
      if (!svg) {
        return;
      }

      svg.style.maxWidth = "100%";
      svg.style.height = "auto";
      svg.style.touchAction = "none";

      const vb0 = (svg.getAttribute("viewBox") || "0 0 800 600").split(/\s+/).map(Number);
      let viewBox = {
        x: vb0[0] || 0,
        y: vb0[1] || 0,
        w: vb0[2] || 800,
        h: vb0[3] || 600
      };

      function applyViewBox() {
        svg.setAttribute("viewBox", `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
      }

      const pointGroups = Array.from(svg.querySelectorAll("g")).filter((g) => {
        const c = g.querySelector("circle");
        const t = g.querySelector("text");
        return Boolean(c && t && !g.closest("defs"));
      });

      const points = pointGroups
        .map((g) => {
          const circle = g.querySelector("circle");
          const text = g.querySelector("text");
          if (!circle || !text) {
            return null;
          }
          const id = (text.textContent || "").trim();
          if (!id || id.startsWith("_")) {
            return null;
          }
          const x = parseNumber(circle.getAttribute("cx"));
          const y = parseNumber(circle.getAttribute("cy"));
          g.style.cursor = "grab";
          return { id, group: g, circle, text, x, y, prevX: x, prevY: y, lines: [], centeredCircles: [], radiusCircles: [] };
        })
        .filter(Boolean);

      const pointById = new Map(points.map((p) => [p.id, p]));

      function getPoint(id) {
        if (!id || typeof id !== "string") {
          return null;
        }
        return pointById.get(id) || pointById.get(id.toUpperCase()) || pointById.get(id.toLowerCase()) || null;
      }

      const lines = Array.from(svg.querySelectorAll("line"));
      for (const line of lines) {
        const x1 = parseNumber(line.getAttribute("x1"));
        const y1 = parseNumber(line.getAttribute("y1"));
        const x2 = parseNumber(line.getAttribute("x2"));
        const y2 = parseNumber(line.getAttribute("y2"));
        const p1 = findNearestPoint(points, x1, y1, 8);
        const p2 = findNearestPoint(points, x2, y2, 8);
        if (p1) {
          p1.lines.push({ line, end: 1, other: p2 || null });
        }
        if (p2) {
          p2.lines.push({ line, end: 2, other: p1 || null });
        }
      }

      const circleEls = Array.from(svg.querySelectorAll("circle")).filter((c) => {
        const r = parseNumber(c.getAttribute("r"));
        return r > 6; // geometry circles, not point dots
      });

      const circleByCenterId = new Map();

      for (const c of circleEls) {
        const cx = parseNumber(c.getAttribute("cx"));
        const cy = parseNumber(c.getAttribute("cy"));
        const r = parseNumber(c.getAttribute("r"));
        const centerPoint = findNearestPoint(points, cx, cy, 8);
        if (centerPoint) {
          centerPoint.centeredCircles.push(c);
          circleByCenterId.set(centerPoint.id, c);
        }

        let bestAnchor = null;
        let bestDelta = Number.POSITIVE_INFINITY;
        for (const p of points) {
          const d = distance(p.x, p.y, cx, cy);
          const delta = Math.abs(d - r);
          if (delta < bestDelta) {
            bestDelta = delta;
            bestAnchor = p;
          }
        }
        if (bestAnchor && bestDelta < 10) {
          bestAnchor.radiusCircles.push(c);
        }
      }

      function screenToSvg(clientX, clientY) {
        const pt = svg.createSVGPoint();
        pt.x = clientX;
        pt.y = clientY;
        const ctm = svg.getScreenCTM();
        if (!ctm) {
          return { x: 0, y: 0 };
        }
        const out = pt.matrixTransform(ctm.inverse());
        return { x: out.x, y: out.y };
      }

      let dragPoint = null;
      let panStart = null;
      let isApplyingConstraints = false;
      let lockPointId = null;

      function setCircleFromCenterAndAnchor(centerPoint, anchorPoint) {
        const cEl = circleByCenterId.get(centerPoint.id);
        if (!cEl) {
          return;
        }
        cEl.setAttribute("cx", String(centerPoint.x));
        cEl.setAttribute("cy", String(centerPoint.y));
        cEl.setAttribute("r", String(distance(centerPoint.x, centerPoint.y, anchorPoint.x, anchorPoint.y)));
      }

      function applyCircleConstraints(initialChangedIds = []) {
        if (isApplyingConstraints) {
          return;
        }
        isApplyingConstraints = true;
        const data = parsed || {};
        const circlesByDiameter = Array.isArray(data.circlesByDiameter) ? data.circlesByDiameter : [];
        const pointsOnCircles = Array.isArray(data.pointsOnCircles) ? data.pointsOnCircles : [];
        const perpendiculars = Array.isArray(data.perpendiculars) ? data.perpendiculars : [];
        const perpThroughInters = Array.isArray(data.perpendicularThroughPointIntersections)
          ? data.perpendicularThroughPointIntersections
          : [];
        const tangents = Array.isArray(data.tangents) ? data.tangents : [];
        const namedTangents = Array.isArray(data.namedTangents) ? data.namedTangents : [];
        const tangentIntersections = Array.isArray(data.tangentIntersections) ? data.tangentIntersections : [];
        const pointsOnCircleSet = new Set(pointsOnCircles.map((r) => String(r.point || "").toUpperCase()));
        const EPS = 1e-3;
        let frontier = new Set(
          (Array.isArray(initialChangedIds) && initialChangedIds.length ? initialChangedIds : points.map((p) => p.id))
            .map((id) => String(id || "").toUpperCase())
            .filter(Boolean)
        );
        let nextFrontier = new Set();

        function lineIntersection(a1, a2, b1, b2) {
          const den = (a1.x - a2.x) * (b1.y - b2.y) - (a1.y - a2.y) * (b1.x - b2.x);
          if (Math.abs(den) < 1e-9) {
            return null;
          }
          const px =
            ((a1.x * a2.y - a1.y * a2.x) * (b1.x - b2.x) - (a1.x - a2.x) * (b1.x * b2.y - b1.y * b2.x)) / den;
          const py =
            ((a1.x * a2.y - a1.y * a2.x) * (b1.y - b2.y) - (a1.y - a2.y) * (b1.x * b2.y - b1.y * b2.x)) / den;
          return { x: px, y: py };
        }

        function setDependentPoint(p, x, y) {
          if (!p) {
            return false;
          }
          if (lockPointId && String(p.id || "").toUpperCase() === String(lockPointId).toUpperCase()) {
            return false;
          }
          if (distance(p.x, p.y, x, y) < EPS) {
            return false;
          }
          updatePoint(p, x, y, true);
          nextFrontier.add(String(p.id || "").toUpperCase());
          return true;
        }

        function hasAnyChanged(ids) {
          for (const id of ids) {
            if (!id) {
              continue;
            }
            if (frontier.has(String(id).toUpperCase())) {
              return true;
            }
          }
          return false;
        }

        function hasRadiusDriverChanged(centerId) {
          const cid = String(centerId || "").toUpperCase();
          if (!cid) {
            return false;
          }
          for (const dc of circlesByDiameter) {
            const dcCenterId = String(dc.centerId || "O").toUpperCase();
            if (dcCenterId !== cid) {
              continue;
            }
            if (hasAnyChanged([dc.a, dc.b, dc.centerId || "O"])) {
              return true;
            }
          }
          return false;
        }

        function resolveCenterId(rel) {
          return rel.center || rel.circleCenter || circlesByDiameter[0]?.centerId || "O";
        }

        function centerKey(centerId) {
          return String(centerId || "").toUpperCase();
        }

        function circleRadiusByCenterId(centerId) {
          const p = getPoint(centerId);
          if (!p) {
            return 0;
          }
          const cEl = circleByCenterId.get(p.id);
          if (!cEl) {
            return 0;
          }
          return parseNumber(cEl.getAttribute("r"), 0);
        }

        function radiusFromDiameterCenterId(centerId) {
          const center = getPoint(centerId);
          if (!center) {
            return 0;
          }
          for (const dc of circlesByDiameter) {
            const cid = dc.centerId || "O";
            if (!sameId(cid, centerId)) {
              continue;
            }
            const a = getPoint(dc.a);
            const b = getPoint(dc.b);
            if (a) {
              return distance(center.x, center.y, a.x, a.y);
            }
            if (b) {
              return distance(center.x, center.y, b.x, b.y);
            }
          }
          return 0;
        }

        function sameId(a, b) {
          return String(a || "").toUpperCase() === String(b || "").toUpperCase();
        }

        function resolveTangentEndpoint(atPoint, preferredId, centerId) {
          if (!atPoint) {
            return null;
          }

          const byName = getPoint(preferredId);
          if (byName) {
            return byName;
          }

          // Fallback when parser naming differs: pick a non-radius endpoint connected to touch point.
          for (const link of atPoint.lines) {
            const other = link.other;
            if (!other) {
              continue;
            }
            if (sameId(other.id, centerId)) {
              continue;
            }
            if (!pointsOnCircleSet.has(String(other.id || "").toUpperCase())) {
              return other;
            }
          }

          for (const link of atPoint.lines) {
            const other = link.other;
            if (other && !sameId(other.id, centerId)) {
              return other;
            }
          }
          return null;
        }

        function tangentDirection(at, center) {
          const rvx = at.x - center.x;
          const rvy = at.y - center.y;
          const rlen = Math.sqrt(rvx * rvx + rvy * rvy) || 1;
          return { x: -rvy / rlen, y: rvx / rlen };
        }

        function moveEndpointAlongTangent(at, center, endpoint) {
          if (!at || !center || !endpoint) {
            return;
          }
          const dir = tangentDirection(at, center);
          const keepLen = distance(endpoint.x, endpoint.y, at.x, at.y) || 80;
          setDependentPoint(endpoint, at.x + dir.x * keepLen, at.y + dir.y * keepLen);
        }

        function enforcePerpendicular(line1, line2) {
          const p1 = getPoint(line1?.a);
          const p2 = getPoint(line1?.b);
          const q1 = getPoint(line2?.a);
          const q2 = getPoint(line2?.b);
          if (!p1 || !p2 || !q1 || !q2) {
            return;
          }

          const vx = p2.x - p1.x;
          const vy = p2.y - p1.y;
          const len = Math.sqrt(vx * vx + vy * vy) || 1;
          const perp = { x: -vy / len, y: vx / len };

          const q1Locked = lockPointId && sameId(lockPointId, q1.id);
          const q2Locked = lockPointId && sameId(lockPointId, q2.id);

          if (q1Locked && q2Locked) {
            return;
          }

          if (q1Locked) {
            const keepLen = distance(q1.x, q1.y, q2.x, q2.y) || 80;
            setDependentPoint(q2, q1.x + perp.x * keepLen, q1.y + perp.y * keepLen);
            return;
          }

          if (q2Locked) {
            const keepLen = distance(q1.x, q1.y, q2.x, q2.y) || 80;
            setDependentPoint(q1, q2.x - perp.x * keepLen, q2.y - perp.y * keepLen);
            return;
          }

          const keepLen = distance(q1.x, q1.y, q2.x, q2.y) || 80;
          setDependentPoint(q2, q1.x + perp.x * keepLen, q1.y + perp.y * keepLen);
        }

        function enforceDiameter(dc) {
          const a = getPoint(dc.a);
          const b = getPoint(dc.b);
          const centerId = dc.centerId || "O";
          const center = getPoint(centerId);
          if (!a || !b || !center) {
            return;
          }

          const lockedCenter = lockPointId && sameId(lockPointId, center.id);
          const lockedA = lockPointId && sameId(lockPointId, a.id);
          const lockedB = lockPointId && sameId(lockPointId, b.id);

          if (lockedCenter) {
            const dx = center.x - center.prevX;
            const dy = center.y - center.prevY;
            if (Math.abs(dx) > 1e-9 || Math.abs(dy) > 1e-9) {
              setDependentPoint(a, a.x + dx, a.y + dy);
              setDependentPoint(b, b.x + dx, b.y + dy);
            }
          } else if (lockedA) {
            setDependentPoint(b, 2 * center.x - a.x, 2 * center.y - a.y);
          } else if (lockedB) {
            setDependentPoint(a, 2 * center.x - b.x, 2 * center.y - b.y);
          } else {
            setDependentPoint(center, (a.x + b.x) / 2, (a.y + b.y) / 2);
          }

          const centerNow = getPoint(centerId);
          const anchorNow = getPoint(dc.a) || getPoint(dc.b);
          if (centerNow && anchorNow) {
            setCircleFromCenterAndAnchor(centerNow, anchorNow);
          }
        }

        const radiusByCenter = new Map();
        for (const dc of circlesByDiameter) {
          const cid = centerKey(dc.centerId || "O");
          if (!cid || radiusByCenter.has(cid)) {
            continue;
          }
          radiusByCenter.set(cid, circleRadiusByCenterId(dc.centerId || "O"));
        }
        for (const rel of pointsOnCircles) {
          const cid = centerKey(rel.center);
          if (!cid || radiusByCenter.has(cid)) {
            continue;
          }
          radiusByCenter.set(cid, circleRadiusByCenterId(rel.center));
        }

        for (let layer = 0; layer < 12; layer += 1) {
          if (!frontier.size) {
            break;
          }
          nextFrontier = new Set();
          const radiusChangedCenters = new Set();
          for (const dc of circlesByDiameter) {
            const centerId = dc.centerId || "O";
            const a = getPoint(dc.a);
            const b = getPoint(dc.b);
            const center = getPoint(centerId);
            if (!a || !b || !center) {
              continue;
            }
            if (!hasAnyChanged([dc.a, dc.b, centerId])) {
              continue;
            }
            enforceDiameter(dc);
          }

          for (const [cid, oldRadius] of radiusByCenter.entries()) {
            const newRadius = circleRadiusByCenterId(cid);
            if (Math.abs(newRadius - oldRadius) > EPS) {
              radiusChangedCenters.add(cid);
              radiusByCenter.set(cid, newRadius);
            }
          }

          for (const rel of pointsOnCircles) {
            const p = getPoint(rel.point);
            const center = getPoint(rel.center);
            const cEl = center ? circleByCenterId.get(center.id) : null;
            if (!p || !center || !cEl) {
              continue;
            }
            const relCenterKey = centerKey(rel.center);
            if (
              !hasAnyChanged([rel.point, rel.center]) &&
              !hasRadiusDriverChanged(rel.center) &&
              !radiusChangedCenters.has(relCenterKey)
            ) {
              continue;
            }
            // Explicit constraint: OE = OC = OD when O is center of a diameter-based circle.
            const diameterRadius = radiusFromDiameterCenterId(rel.center);
            const r = diameterRadius > 0 ? diameterRadius : parseNumber(cEl.getAttribute("r"), 0);
            const vx = p.x - center.x;
            const vy = p.y - center.y;
            const len = Math.sqrt(vx * vx + vy * vy) || 1;
            setDependentPoint(p, center.x + (vx / len) * r, center.y + (vy / len) * r);
          }

          // Keep explicit perpendicular constraints stable with directional dependency.
          // Prefer making the line that passes through O depend on the other line.
          for (const rel of perpendiculars) {
            if (!hasAnyChanged([rel.line1?.a, rel.line1?.b, rel.line2?.a, rel.line2?.b])) {
              continue;
            }
            const l1a = getPoint(rel.line1?.a);
            const l1b = getPoint(rel.line1?.b);
            const l2a = getPoint(rel.line2?.a);
            const l2b = getPoint(rel.line2?.b);

            const l1HasO = sameId(l1a?.id, "O") || sameId(l1b?.id, "O");
            const l2HasO = sameId(l2a?.id, "O") || sameId(l2b?.id, "O");

            if (l1HasO && !l2HasO) {
              enforcePerpendicular(rel.line2, rel.line1);
            } else if (l2HasO && !l1HasO) {
              enforcePerpendicular(rel.line1, rel.line2);
            } else {
              enforcePerpendicular(rel.line1, rel.line2);
            }
          }

          // Through-point line perpendicular to `toLine`, intersecting `withLine` at `intersection`.
          for (const rel of perpThroughInters) {
            if (!hasAnyChanged([rel.through, rel.toLine?.a, rel.toLine?.b, rel.withLine?.a, rel.withLine?.b])) {
              continue;
            }
            const through = getPoint(rel.through);
            const toA = getPoint(rel.toLine?.a);
            const toB = getPoint(rel.toLine?.b);
            const w1 = getPoint(rel.withLine?.a);
            const w2 = getPoint(rel.withLine?.b);
            const inter = getPoint(rel.intersection);
            if (!through || !toA || !toB || !w1 || !w2 || !inter) {
              continue;
            }

            const vx = toB.x - toA.x;
            const vy = toB.y - toA.y;
            // Any point offset by (-vy, vx) defines a perpendicular line through `through`.
            const perpEnd = { x: through.x - vy, y: through.y + vx };
            const hit = lineIntersection(through, perpEnd, w1, w2);
            if (!hit) {
              continue;
            }
            setDependentPoint(inter, hit.x, hit.y);
          }

          // Keep named tangent lines perpendicular to the circle radius at the touch point.
          for (const rel of namedTangents) {
            const centerId = resolveCenterId(rel);
            if (!hasAnyChanged([rel.at, centerId, rel.linePoint])) {
              continue;
            }
            const at = getPoint(rel.at);
            const center = getPoint(centerId);
            const linePoint = resolveTangentEndpoint(at, rel.linePoint, centerId);
            if (!at || !linePoint || !center) {
              continue;
            }
            moveEndpointAlongTangent(at, center, linePoint);
          }

          // Also enforce generic tangents: any non-radius endpoint attached to tangent touch point must rotate with OC.
          for (const rel of tangents) {
            const centerId = resolveCenterId(rel);
            if (!hasAnyChanged([rel.at, centerId])) {
              continue;
            }
            const at = getPoint(rel.at);
            const center = getPoint(centerId);
            if (!at || !center) {
              continue;
            }

            const candidates = [];
            const seen = new Set();
            for (const link of at.lines) {
              const other = link.other;
              if (!other) {
                continue;
              }
              const otherKey = String(other.id || "").toUpperCase();
              if (seen.has(otherKey)) {
                continue;
              }
              if (sameId(other.id, center.id)) {
                continue;
              }
              // Do not drag another point that is explicitly constrained to stay on a circle.
              if (pointsOnCircleSet.has(otherKey)) {
                continue;
              }
              seen.add(otherKey);
              candidates.push(other);
            }

            for (const endpoint of candidates) {
              moveEndpointAlongTangent(at, center, endpoint);
            }
          }

          // Recompute intersections that depend on tangent lines.
          for (const rel of tangentIntersections) {
            const centerId = resolveCenterId(rel);
            if (!hasAnyChanged([rel.at, centerId, rel.withLine?.a, rel.withLine?.b, rel.intersection])) {
              continue;
            }
            const at = getPoint(rel.at);
            const center = getPoint(centerId);
            const inter = getPoint(rel.intersection) || resolveTangentEndpoint(at, rel.intersection, centerId);
            const w1 = getPoint(rel.withLine?.a);
            const w2 = getPoint(rel.withLine?.b);
            if (!at || !center || !inter || !w1 || !w2) {
              continue;
            }

            const rvx = at.x - center.x;
            const rvy = at.y - center.y;
            const tangentDir = { x: -rvy, y: rvx };
            const tangentEnd = { x: at.x + tangentDir.x, y: at.y + tangentDir.y };
            const hit = lineIntersection(at, tangentEnd, w1, w2);
            if (!hit) {
              continue;
            }
            setDependentPoint(inter, hit.x, hit.y);
          }

          // Strongly enforce diameter after all other layer updates.
          for (const dc of circlesByDiameter) {
            enforceDiameter(dc);
          }

          frontier = nextFrontier;
        }

        // Final hard pass to guarantee diameter relations after all propagated updates.
        for (const dc of circlesByDiameter) {
          enforceDiameter(dc);
        }

        isApplyingConstraints = false;
      }

      function updatePoint(p, x, y, skipConstraints = false) {
        p.prevX = p.x;
        p.prevY = p.y;
        p.x = x;
        p.y = y;
        p.circle.setAttribute("cx", String(x));
        p.circle.setAttribute("cy", String(y));
        p.text.setAttribute("x", String(x + 8));
        p.text.setAttribute("y", String(y - 8));

        for (const item of p.lines) {
          if (item.end === 1) {
            item.line.setAttribute("x1", String(x));
            item.line.setAttribute("y1", String(y));
          } else {
            item.line.setAttribute("x2", String(x));
            item.line.setAttribute("y2", String(y));
          }
        }

        for (const c of p.centeredCircles) {
          c.setAttribute("cx", String(x));
          c.setAttribute("cy", String(y));
        }

        for (const c of p.radiusCircles) {
          const cx = parseNumber(c.getAttribute("cx"));
          const cy = parseNumber(c.getAttribute("cy"));
          c.setAttribute("r", String(distance(x, y, cx, cy)));
        }

        if (!skipConstraints) {
          applyCircleConstraints([p.id]);
        }
      }

      svg.addEventListener("pointerdown", (evt) => {
        const targetGroup = evt.target.closest("g");
        const p = points.find((it) => it.group === targetGroup);
        if (p) {
          evt.preventDefault();
          dragPoint = p;
          lockPointId = p.id;
          p.group.classList.add("dragging-point");
          svg.setPointerCapture(evt.pointerId);
          return;
        }

        panStart = {
          pointerId: evt.pointerId,
          clientX: evt.clientX,
          clientY: evt.clientY,
          viewX: viewBox.x,
          viewY: viewBox.y
        };
        svg.setPointerCapture(evt.pointerId);
      });

      svg.addEventListener("pointermove", (evt) => {
        if (dragPoint) {
          evt.preventDefault();
          const p = screenToSvg(evt.clientX, evt.clientY);
          updatePoint(dragPoint, p.x, p.y);
          return;
        }

        if (panStart && panStart.pointerId === evt.pointerId) {
          evt.preventDefault();
          const dx = (evt.clientX - panStart.clientX) * (viewBox.w / svg.clientWidth);
          const dy = (evt.clientY - panStart.clientY) * (viewBox.h / svg.clientHeight);
          viewBox.x = panStart.viewX - dx;
          viewBox.y = panStart.viewY - dy;
          applyViewBox();
        }
      });

      svg.addEventListener("pointerup", (evt) => {
        if (dragPoint) {
          dragPoint.group.classList.remove("dragging-point");
          dragPoint = null;
          lockPointId = null;
        }
        if (panStart && panStart.pointerId === evt.pointerId) {
          panStart = null;
        }
      });

      svg.addEventListener("pointercancel", () => {
        if (dragPoint) {
          dragPoint.group.classList.remove("dragging-point");
          dragPoint = null;
          lockPointId = null;
        }
        panStart = null;
      });

      svg.addEventListener("wheel", (evt) => {
        evt.preventDefault();
        const zoom = evt.deltaY < 0 ? 0.9 : 1.1;
        const p = screenToSvg(evt.clientX, evt.clientY);

        const nw = viewBox.w * zoom;
        const nh = viewBox.h * zoom;
        const ratioX = (p.x - viewBox.x) / viewBox.w;
        const ratioY = (p.y - viewBox.y) / viewBox.h;

        viewBox.x = p.x - ratioX * nw;
        viewBox.y = p.y - ratioY * nh;
        viewBox.w = Math.max(80, Math.min(5000, nw));
        viewBox.h = Math.max(60, Math.min(4000, nh));
        applyViewBox();
      }, { passive: false });

      // Snap initial geometry to key circle constraints to avoid visible drift.
      applyCircleConstraints(points.map((p) => p.id));
    }

    function renderTurn(turn) {
      pushBubble("user", turn.userText || "[empty]");
      pushAssistantWithSvg({
        parserVersion: turn.parserVersion,
        diagnostics: turn.diagnostics,
        recognizedText: turn.recognizedText,
        warnings: turn.warnings,
        svg: turn.svg,
        parsed: null
      });
    }

    async function loadHistory() {
      try {
        const resp = await fetch(apiUrl(`/api/session?sessionId=${encodeURIComponent(sessionId)}`));
        if (!resp.ok) {
          return;
        }
        const data = await resp.json();
        if (!data.ok || !Array.isArray(data.turns)) {
          return;
        }
        if (data.turns.length === 0) {
          pushBubble("assistant", "Chao ban. Hay gui de bai text hoac anh, toi se ve hinh SVG cho ban.");
          return;
        }
        for (const turn of data.turns) {
          renderTurn(turn);
        }
      } catch (_err) {
        pushBubble("assistant", "Chao ban. Hay gui de bai text hoac anh, toi se ve hinh SVG cho ban.");
      }
    }

    function createProgressBubble() {
      const waiting = document.createElement("div");
      waiting.className = "bubble assistant";
      const title = document.createElement("div");
      title.innerHTML = '<span class="loader"></span>Dang xu ly...';
      waiting.appendChild(title);

      const progress = document.createElement("div");
      progress.className = "progress";
      progress.textContent = "Khoi tao";
      waiting.appendChild(progress);

      messages.appendChild(waiting);
      messages.scrollTop = messages.scrollHeight;
      return { waiting, progress };
    }

    async function streamSolve(payload, onProgress) {
      const resp = await fetch(apiUrl("/api/solve/stream"), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!resp.ok || !resp.body) {
        const data = await resp.json().catch(() => ({}));
        throw new Error(data.error || "Cannot start streaming");
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let finalPayload = null;

      while (true) {
        const { done, value } = await reader.read();
        if (done) {
          break;
        }
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop() || "";

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed) {
            continue;
          }
          const event = JSON.parse(trimmed);
          if (event.type === "progress") {
            onProgress(`${event.stage}: ${event.message}`);
          } else if (event.type === "result") {
            finalPayload = event.payload;
          } else if (event.type === "error") {
            throw new Error(event.message || "Unknown stream error");
          }
        }
      }

      if (!finalPayload) {
        throw new Error("No result returned from stream");
      }

      return finalPayload;
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error("Cannot read image"));
        reader.readAsDataURL(file);
      });
    }

    async function submit() {
      const message = promptEl.value.trim();
      const file = fileEl.files && fileEl.files[0];
      if (!message && !file) {
        pushBubble("error", "Hay nhap de bai hoac chon anh truoc khi gui.");
        return;
      }

      let imageDataUrl = "";
      if (file) {
        imageDataUrl = await readFileAsDataUrl(file);
      }

      const userPreview = message || "[Da gui anh de OCR]";
      pushBubble("user", userPreview);

      const progressUI = createProgressBubble();

      try {
        const data = await streamSolve({
          sessionId,
          message,
          imageDataUrl,
          parserMode: modeEl.value,
          solverIterations: 180
        }, (msg) => {
          progressUI.progress.textContent = msg;
        });

        progressUI.waiting.remove();

        pushAssistantWithSvg(data);
      } catch (error) {
        progressUI.waiting.remove();
        pushBubble("error", error.message || String(error));
      }
    }

    sendBtn.addEventListener("click", submit);
    promptEl.addEventListener("keydown", (evt) => {
      if ((evt.metaKey || evt.ctrlKey) && evt.key === "Enter") {
        submit();
      }
    });
    clearBtn.addEventListener("click", () => {
      fetch(apiUrl("/api/session/clear"), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId })
      }).catch(() => undefined).finally(() => {
        messages.innerHTML = "";
        promptEl.value = "";
        fileEl.value = "";
        pushBubble("assistant", "Hoi thoai da duoc xoa. Hay gui de bai moi.");
      });
    });

    if (window.location.hostname.endsWith("github.io") && !apiBase) {
      pushBubble("error", "Chua cau hinh GEOMCP_API_BASE trong web/config.js. Hay tro den backend cloud URL.");
    }

    loadHistory();
  </script>
</body>
