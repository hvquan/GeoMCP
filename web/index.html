<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoMCP Chat UI</title>
  <style>
    :root {
      --bg: #f4efe6;
      --bg2: #e8f2ff;
      --panel: #fffdf7;
      --ink: #1c2430;
      --muted: #6b7280;
      --accent: #c2410c;
      --user: #0f766e;
      --assistant: #1d4ed8;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Serif", Georgia, serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 0%, #fff7ed 0, transparent 36%),
        radial-gradient(circle at 100% 100%, #dbeafe 0, transparent 34%),
        linear-gradient(120deg, var(--bg) 0%, var(--bg2) 100%);
    }

    .app {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 290px 1fr;
      gap: 16px;
    }

    .sidebar {
      background: rgba(255, 253, 247, 0.92);
      border: 1px solid #e5dcc8;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.08);
    }

    .brand {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .sub {
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.6;
      font-size: 14px;
    }

    .chip {
      display: inline-block;
      margin: 8px 8px 0 0;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: #1e3a8a;
      background: #dbeafe;
    }

    .main {
      min-height: 78vh;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #d6deef;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.1);
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .messages {
      padding: 18px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bubble {
      max-width: 85%;
      border-radius: 16px;
      padding: 12px 14px;
      line-height: 1.55;
      animation: rise 220ms ease;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: #d1fae5;
      border: 1px solid #99f6e4;
    }

    .assistant {
      align-self: flex-start;
      background: #eef4ff;
      border: 1px solid #c7d2fe;
    }

    .error {
      align-self: flex-start;
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: var(--danger);
    }

    .svg-wrap {
      margin-top: 10px;
      background: #fff;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      padding: 8px;
      overflow: auto;
    }

    .composer {
      border-top: 1px solid #e2e8f0;
      padding: 14px;
      background: #fcfcff;
    }

    .composer textarea {
      width: 100%;
      min-height: 84px;
      resize: vertical;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 10px 12px;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      font-size: 15px;
    }

    .row {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .row input[type="file"] {
      font-size: 13px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(90deg, #ea580c, #0284c7);
    }

    .ghost {
      background: #e2e8f0;
      color: #1f2937;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    .progress {
      margin-top: 8px;
      font-size: 13px;
      color: #334155;
    }

    .loader {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 3px solid #cbd5e1;
      border-top-color: var(--assistant);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { order: 2; }
      .main { min-height: 70vh; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="brand">GeoMCP Chat</h1>
      <p class="sub">
        Nhap de toan hinh hoc hoac upload anh. He thong se OCR (neu co anh), phan tich de,
        giai rang buoc va ve hinh SVG.
      </p>
      <span class="chip">Text to Diagram</span>
      <span class="chip">Image to Text</span>
      <span class="chip">Constraint Solver</span>
      <p class="meta">Tip: Ban co the danh may de bai ro rang de giam sai OCR.</p>
    </aside>

    <section class="main">
      <div id="messages" class="messages"></div>

      <div class="composer">
        <textarea id="prompt" placeholder="Nhap de bai hinh hoc..."></textarea>
        <div class="row">
          <input id="file" type="file" accept="image/*" />
          <select id="mode">
            <option value="llm">Parser mode: LLM + fallback</option>
            <option value="heuristic">Parser mode: Heuristic only</option>
          </select>
          <button id="send">Gui</button>
          <button id="clear" class="ghost">Xoa hoi thoai</button>
        </div>
      </div>
    </section>
  </div>

  <script src="./config.js"></script>
  <script>
    const messages = document.getElementById("messages");
    const promptEl = document.getElementById("prompt");
    const fileEl = document.getElementById("file");
    const sendBtn = document.getElementById("send");
    const clearBtn = document.getElementById("clear");
    const modeEl = document.getElementById("mode");
    const SESSION_KEY = "geomcp_chat_session_id";
    const apiBase = (window.GEOMCP_API_BASE || "").replace(/\/$/, "");

    function apiUrl(path) {
      return apiBase ? `${apiBase}${path}` : path;
    }

    function ensureSessionId() {
      let id = localStorage.getItem(SESSION_KEY);
      if (!id) {
        id = `sess_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
        localStorage.setItem(SESSION_KEY, id);
      }
      return id;
    }

    const sessionId = ensureSessionId();

    function pushBubble(role, text) {
      const div = document.createElement("div");
      div.className = `bubble ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function pushAssistantWithSvg(payload) {
      const div = document.createElement("div");
      div.className = "bubble assistant";

      const summary = document.createElement("div");
      const lines = [
        `Parser: ${payload.parserVersion}`,
        `Diagnostics: ${(payload.diagnostics || []).length}`,
        payload.recognizedText ? `Recognized text:\n${payload.recognizedText}` : ""
      ].filter(Boolean).join("\n\n");
      summary.textContent = lines;
      div.appendChild(summary);

      if (payload.warnings && payload.warnings.length) {
        const warn = document.createElement("div");
        warn.className = "meta";
        warn.textContent = `Warnings: ${payload.warnings.join(" | ")}`;
        div.appendChild(warn);
      }

      const wrap = document.createElement("div");
      wrap.className = "svg-wrap";
      wrap.innerHTML = payload.svg;
      div.appendChild(wrap);

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function renderTurn(turn) {
      pushBubble("user", turn.userText || "[empty]");
      pushAssistantWithSvg({
        parserVersion: turn.parserVersion,
        diagnostics: turn.diagnostics,
        recognizedText: turn.recognizedText,
        warnings: turn.warnings,
        svg: turn.svg
      });
    }

    async function loadHistory() {
      try {
        const resp = await fetch(apiUrl(`/api/session?sessionId=${encodeURIComponent(sessionId)}`));
        if (!resp.ok) {
          return;
        }
        const data = await resp.json();
        if (!data.ok || !Array.isArray(data.turns)) {
          return;
        }
        if (data.turns.length === 0) {
          pushBubble("assistant", "Chao ban. Hay gui de bai text hoac anh, toi se ve hinh SVG cho ban.");
          return;
        }
        for (const turn of data.turns) {
          renderTurn(turn);
        }
      } catch (_err) {
        pushBubble("assistant", "Chao ban. Hay gui de bai text hoac anh, toi se ve hinh SVG cho ban.");
      }
    }

    function createProgressBubble() {
      const waiting = document.createElement("div");
      waiting.className = "bubble assistant";
      const title = document.createElement("div");
      title.innerHTML = '<span class="loader"></span>Dang xu ly...';
      waiting.appendChild(title);

      const progress = document.createElement("div");
      progress.className = "progress";
      progress.textContent = "Khoi tao";
      waiting.appendChild(progress);

      messages.appendChild(waiting);
      messages.scrollTop = messages.scrollHeight;
      return { waiting, progress };
    }

    async function streamSolve(payload, onProgress) {
      const resp = await fetch(apiUrl("/api/solve/stream"), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!resp.ok || !resp.body) {
        const data = await resp.json().catch(() => ({}));
        throw new Error(data.error || "Cannot start streaming");
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let finalPayload = null;

      while (true) {
        const { done, value } = await reader.read();
        if (done) {
          break;
        }
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop() || "";

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed) {
            continue;
          }
          const event = JSON.parse(trimmed);
          if (event.type === "progress") {
            onProgress(`${event.stage}: ${event.message}`);
          } else if (event.type === "result") {
            finalPayload = event.payload;
          } else if (event.type === "error") {
            throw new Error(event.message || "Unknown stream error");
          }
        }
      }

      if (!finalPayload) {
        throw new Error("No result returned from stream");
      }

      return finalPayload;
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error("Cannot read image"));
        reader.readAsDataURL(file);
      });
    }

    async function submit() {
      const message = promptEl.value.trim();
      const file = fileEl.files && fileEl.files[0];
      if (!message && !file) {
        pushBubble("error", "Hay nhap de bai hoac chon anh truoc khi gui.");
        return;
      }

      let imageDataUrl = "";
      if (file) {
        imageDataUrl = await readFileAsDataUrl(file);
      }

      const userPreview = message || "[Da gui anh de OCR]";
      pushBubble("user", userPreview);

      const progressUI = createProgressBubble();

      try {
        const data = await streamSolve({
          sessionId,
          message,
          imageDataUrl,
          parserMode: modeEl.value,
          solverIterations: 180
        }, (msg) => {
          progressUI.progress.textContent = msg;
        });

        progressUI.waiting.remove();

        pushAssistantWithSvg(data);
      } catch (error) {
        progressUI.waiting.remove();
        pushBubble("error", error.message || String(error));
      }
    }

    sendBtn.addEventListener("click", submit);
    promptEl.addEventListener("keydown", (evt) => {
      if ((evt.metaKey || evt.ctrlKey) && evt.key === "Enter") {
        submit();
      }
    });
    clearBtn.addEventListener("click", () => {
      fetch(apiUrl("/api/session/clear"), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId })
      }).catch(() => undefined).finally(() => {
        messages.innerHTML = "";
        promptEl.value = "";
        fileEl.value = "";
        pushBubble("assistant", "Hoi thoai da duoc xoa. Hay gui de bai moi.");
      });
    });

    if (window.location.hostname.endsWith("github.io") && !apiBase) {
      pushBubble("error", "Chua cau hinh GEOMCP_API_BASE trong web/config.js. Hay tro den backend cloud URL.");
    }

    loadHistory();
  </script>
</body>
</html>
